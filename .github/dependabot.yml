version: 2
updates:
  # NPM dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 10
    reviewers:
      - 'owner'
    labels:
      - 'dependencies'
      - 'automerge'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      production-dependencies:
        dependency-type: 'production'
      development-dependencies:
        dependency-type: 'development'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 5
    labels:
      - 'ci/cd'
      - 'automerge'
    commit-message:
      prefix: 'ci'
