name: E2E Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CI: true
  PLAYWRIGHT_BROWSERS_PATH: /tmp/browsers

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

