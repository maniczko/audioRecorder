name: Railway Error Reporter

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:
    inputs:
      log_lines:
        description: 'Number of log lines to fetch'
        required: false
        default: '100'
        type: number
      log_filter:
        description: 'Log filter query, for example @level:error'
        required: false
        default: '@level:error'
        type: string
      create_issue:
        description: 'Create or update GitHub issues for active error groups'
        required: false
        default: 'true'
        type: boolean

jobs:
  fetch-railway-errors:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Link to project if needed
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: '6c73db42-8183-4e3b-b546-5edaa616cfe4'
        run: railway link $RAILWAY_PROJECT_ID || echo "Skipping link, using project ID directly"

      - name: Fetch Railway errors
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: '6c73db42-8183-4e3b-b546-5edaa616cfe4'
          RAILWAY_LOG_LINES: ${{ github.event.inputs.log_lines || 100 }}
          RAILWAY_LOG_FILTER: ${{ github.event.inputs.log_filter || '@level:error' }}
        run: node scripts/fetch-railway-errors.js --json

      - name: Upload error reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: railway-error-reports
          path: railway-errors/
          retention-days: 30

      - name: Upsert grouped issues for errors
        if: ${{ github.event.inputs.create_issue != 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: node scripts/upsert-monitoring-issues.mjs --provider railway --reports-dir railway-errors
