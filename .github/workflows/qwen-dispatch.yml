name: '🔀 Qwen Code Dispatch'

on:
  issues:
    types: ['opened', 'reopened']
  issue_comment:
    types: ['created']

defaults:
  run:
    shell: 'bash'

jobs:
  dispatch:
    # Fire for CI failure issues OR for @qwencoder comments from repo members
    if: |
      (
        github.event_name == 'issues' &&
        contains(fromJSON('["opened", "reopened"]'), github.event.action) &&
        contains(github.event.issue.title, '[CI]')
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.sender.type == 'User' &&
        startsWith(github.event.comment.body, '@qwencoder') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    outputs:
      command: '${{ steps.extract_command.outputs.command }}'
      additional_context: '${{ steps.extract_command.outputs.additional_context }}'
      issue_number: '${{ github.event.issue.number }}'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: '${{ vars.APP_ID }}'
        uses: 'actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b'
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Extract command'
        id: 'extract_command'
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        env:
          EVENT_TYPE: '${{ github.event_name }}.${{ github.event.action }}'
          REQUEST: '${{ github.event.comment.body || github.event.issue.body }}'
          ISSUE_TITLE: '${{ github.event.issue.title }}'
        with:
          script: |
            const eventType = process.env.EVENT_TYPE;
            const request = process.env.REQUEST || '';
            const title = process.env.ISSUE_TITLE || '';

            // CI failure issues → always fix
            if (eventType.startsWith('issues.') && title.includes('[CI]')) {
              core.setOutput('command', 'fix');
              return;
            }
            // @qwencoder comments
            if (request.startsWith('@qwencoder /review')) {
              core.setOutput('command', 'review');
            } else if (request.startsWith('@qwencoder')) {
              const ctx = request.replace(/^@qwencoder/, '').trim();
              core.setOutput('command', 'invoke');
              core.setOutput('additional_context', ctx);
            } else {
              core.setOutput('command', 'fallthrough');
            }

      - name: 'Acknowledge request'
        env:
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN }}'
          ISSUE_NUMBER: '${{ github.event.issue.number }}'
          MESSAGE: >-
            Hi @${{ github.actor }}, odbieram zadanie i zaczynam pracę!
            Śledzenie postępu: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: '${{ github.repository }}'
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "${MESSAGE}" \
            --repo "${REPOSITORY}"

  fix:
    needs: 'dispatch'
    if: "${{ needs.dispatch.outputs.command == 'fix' || needs.dispatch.outputs.command == 'invoke' }}"
    uses: './.github/workflows/qwen-issue-fixer.yml'
    permissions:
      contents: 'write'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    secrets: 'inherit'

  fallthrough:
    needs: ['dispatch', 'fix']
    if: "${{ always() && !cancelled() && (failure() || needs.dispatch.outputs.command == 'fallthrough') }}"
    runs-on: 'ubuntu-latest'
    permissions:
      issues: 'write'
    steps:
      - name: 'Send failure comment'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ISSUE_NUMBER: '${{ github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
        run: |
          gh issue comment "${ISSUE_NUMBER}" \
            --body "Przepraszam, napotkałem błąd. [Zobacz logi](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --repo "${REPOSITORY}"
