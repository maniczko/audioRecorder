name: Auto-Fix Test Failures

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: write

jobs:
  test-and-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      VITE_DATA_PROVIDER: local
      VITE_MEDIA_PROVIDER: local
      VITE_API_BASE_URL: http://127.0.0.1:4000
      VITE_GOOGLE_CLIENT_ID: dummy-ci.apps.googleusercontent.com
      OPENAI_API_KEY: sk-proj-dummy-ci-key-for-validating-env-123456789
      GROQ_API_KEY: gsk_dummy-ci-key-12345678901234567890
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy.signature
      VOICELOG_API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@dummy.supabase.com:5432/postgres
      LANGCHAIN_API_KEY: lsv2_pt_dummy_key_1234
      GITHUB_TOKEN: github_pat_dummy_token_1234

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint auto-fix
        id: lint
        continue-on-error: true
        run: |
          echo "Running ESLint auto-fix..."
          pnpm run lint:fix && echo "lint_status=0" >> $GITHUB_OUTPUT || echo "lint_status=1" >> $GITHUB_OUTPUT

      - name: Run format
        id: format
        continue-on-error: true
        run: |
          echo "Running format..."
          pnpm run format && echo "format_status=0" >> $GITHUB_OUTPUT || echo "format_status=1" >> $GITHUB_OUTPUT

      - name: Run tests with retry
        id: tests
        continue-on-error: true
        run: |
          echo "Running tests with retry..."
          pnpm run test:retry && echo "tests_status=0" >> $GITHUB_OUTPUT || echo "tests_status=1" >> $GITHUB_OUTPUT

      - name: Commit fixes
        if: steps.lint.outputs.lint_status == '0' || steps.format.outputs.format_status == '0'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: auto-fix ESLint and format errors'
          branch: ${{ github.head_ref }}
          file_pattern: '*.ts *.tsx *.js *.jsx src/**/* server/**/*'
          commit_options: '--no-verify'

      - name: Upload test failure report
        if: steps.tests.outputs.tests_failed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: test-failure-report
          path: |
            coverage/
            *.log
          retention-days: 7

      - name: Report test status
        id: report
        run: |
          echo "Workflow Summary:"
          echo "- ESLint: ${{ steps.lint.outputs.lint_status == '0' && '✅ Fixed' || '⚠️ Some issues remain' }}"
          echo "- Format: ${{ steps.format.outputs.format_status == '0' && '✅ Fixed' || '⚠️ Some issues remain' }}"
          echo "- Tests: ${{ steps.tests.outputs.tests_status == '0' && '✅ All passing' || '⚠️ Some tests failing' }}"

      - name: Comment on PR with status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const lintStatus = Number('${{ steps.lint.outputs.lint_status }}' || '1');
            const formatStatus = Number('${{ steps.format.outputs.format_status }}' || '1');
            const testsStatus = Number('${{ steps.tests.outputs.tests_status }}' || '1');

            const hasFixes = lintStatus === 0 || formatStatus === 0;
            const allPassing = lintStatus === 0 && formatStatus === 0 && testsStatus === 0;

            if (allPassing) {
              console.log('✅ All checks passed');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.body.includes('🔧 Auto-Fix Summary')
            );

            const statusMessage = [
              '## 🔧 Auto-Fix Summary',
              '',
              `- **ESLint:** ${lintStatus === 0 ? '✅ Fixed' : '⚠️ Some issues'}`,
              `- **Format:** ${formatStatus === 0 ? '✅ Fixed' : '⚠️ Some issues'}`,
              `- **Tests:** ${testsStatus === 0 ? '✅ All passing' : '❌ Some failing'}`,
              '',
              hasFixes ? 'Fixes have been automatically committed.' : '',
              testsStatus !== 0 ? '⚠️ Some tests are still failing. Please review and fix manually.' : '',
            ].filter(Boolean).join('\n');

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: statusMessage,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: statusMessage,
              });
            }

      - name: Fail workflow if critical checks failed
        if: failure() && (steps.lint.outcome == 'failure' || steps.tests.outcome == 'failure')
        run: |
          echo "❌ Auto-fix workflow encountered failures:"
          echo "- ESLint: ${{ steps.lint.outcome == 'success' && '✅ Fixed' || '⚠️ Issues remain' }}"
          echo "- Tests: ${{ steps.tests.outcome == 'success' && '✅ Fixed' || '⚠️ Issues remain' }}"
          echo ""
          echo "Please review the logs and fix manually if needed."
          exit 1
