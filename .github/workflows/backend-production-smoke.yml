name: Backend Production Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-backend-production:
    name: Verify Backend Production
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Smoke-check deployed backend health
        id: smoke
        run: |
          echo "╔═══════════════════════════════════════════════════════════╗"
          echo "║  🚬 Starting Backend Production Smoke Test                ║"
          echo "╚═══════════════════════════════════════════════════════════╝"
          echo ""
          echo "Configuration:"
          echo "  - URL: $SMOKE_TEST_URL"
          echo "  - Expected Git SHA: $EXPECTED_GIT_SHA"
          echo "  - Max Retries: $SMOKE_MAX_RETRIES"
          echo "  - Wait Between Retries: ${SMOKE_WAIT_MS}ms"
          echo "  - Total Max Wait: ~$((SMOKE_MAX_RETRIES * SMOKE_WAIT_MS / 1000))s"
          echo ""
          echo "Starting smoke test..."
          pnpm run test:smoke
        env:
          SMOKE_TEST_URL: https://audiorecorder-production.up.railway.app/health
          EXPECTED_GIT_SHA: ${{ github.sha }}
          SMOKE_MAX_RETRIES: '10'
          SMOKE_WAIT_MS: '10000'

      - name: Debug - Log Railway deployment status
        if: failure()
        run: |
          echo "Smoke test failed!"
          echo "Checking Railway deployment status..."
          curl -v "$SMOKE_TEST_URL" || echo "Railway not responding"
        continue-on-error: true

      - name: Create GitHub issue on production crash
        if: failure() && steps.smoke.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 8);
            const fullSha = context.sha;
            const now = new Date().toISOString();
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${fullSha}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const railwayUrl = 'https://railway.app/dashboard';
            const { owner, repo } = context.repo;

            // Ensure labels exist (create if missing)
            const requiredLabels = [
              { name: 'crash', color: 'D93F0B', description: 'Production crash requiring immediate fix' },
              { name: 'production', color: '0075ca', description: 'Affects production environment' },
            ];
            for (const label of requiredLabels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
              } catch {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              }
            }

            // Check if an open issue for this SHA already exists to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'crash,production', per_page: 10,
            });
            const alreadyOpen = existing.data.some(i => i.title.includes(sha));
            if (alreadyOpen) {
              console.log(`Issue for ${sha} already exists, skipping.`);
              return;
            }

            const issue = await github.rest.issues.create({
              owner, repo,
              title: `🚨 Production crash: backend unhealthy after deploy ${sha}`,
              labels: ['crash', 'production'],
              body: [
                `## Backend production crash detected`,
                ``,
                `The smoke test failed — Railway did not respond with a healthy status after deploying commit [\`${sha}\`](${commitUrl}).`,
                ``,
                `| | |`,
                `|---|---|`,
                `| **Commit** | [\`${fullSha}\`](${commitUrl}) |`,
                `| **Time** | ${now} |`,
                `| **CI run** | [View smoke logs](${runUrl}) |`,
                `| **Railway** | [Dashboard](${railwayUrl}) |`,
                ``,
                `### Immediate checklist`,
                `- [ ] Open Railway dashboard → Deploy Logs for this service`,
                `- [ ] Identify the crash in the stack trace`,
                `- [ ] Roll back to the previous Railway deployment if users are affected`,
                `- [ ] Fix the root cause, push a new commit`,
                `- [ ] Verify smoke test passes, then close this issue`,
                ``,
                `*Auto-created by \`backend-production-smoke\` workflow.*`,
              ].join('\n'),
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
            core.summary.addRaw(`## 🚨 Production crash issue created\n[#${issue.data.number}](${issue.data.html_url})`);
            await core.summary.write();
