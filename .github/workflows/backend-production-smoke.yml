name: Backend Production Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: backend-production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-backend-production:
    name: Verify Backend Production
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Smoke-check deployed backend health
        run: pnpm run test:smoke
        env:
          SMOKE_TEST_URL: https://audiorecorder-production.up.railway.app/health
          EXPECTED_GIT_SHA: ${{ github.sha }}
          SMOKE_MAX_RETRIES: "15"
          SMOKE_WAIT_MS: "30000"
