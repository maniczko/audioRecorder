name: 'GPT Auto-Fix'

# Called directly by ci-failure-triage via workflow_dispatch.
# (issues:opened from GITHUB_TOKEN does not re-trigger workflows — GitHub security restriction)
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue number to fix'
        required: true
      issue_title:
        description: 'Issue title'
        required: true
      issue_body:
        description: 'Issue body with error details'
        required: true

jobs:
  fix:
    name: 'Fix with GPT-4o'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python + Aider
        run: |
          pip install --upgrade --quiet aider-chat
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Acknowledge issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" \
            --body "🤖 GPT-4o odebrał zadanie. Analizuję błędy i przygotowuję PR..." \
            --repo "${{ github.repository }}"

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="gpt-fix-${{ inputs.issue_number }}-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Aider to fix failing tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_BODY: ${{ inputs.issue_body }}
          ISSUE_TITLE: ${{ inputs.issue_title }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # gpt-4o-mini: 200k TPM limit (vs 30k for gpt-4o) — fits large repos
          MODEL="${{ vars.GPT_MODEL || 'gpt-4o-mini' }}"

          # Extract file paths from issue body
          FILES=$(echo "$ISSUE_BODY" | grep -oP '(?:src|server)/[^\s:,`\n]+\.[jt]sx?' | sort -u | tr '\n' ' ')
          echo "Files extracted from errors: $FILES"

          # Extract error blocks only (cap to avoid token overflow)
          ERRORS=$(echo "$ISSUE_BODY" | sed -n '/^```/,/^```/p' | head -c 2000)

          PROMPT="Fix failing CI tests in this TypeScript/Node.js project.

          Issue: ${ISSUE_TITLE}

          Errors:
          ${ERRORS}

          Rules:
          1. Fix the root cause — do NOT suppress errors
          2. If a test imports a missing package (e.g. bun:sqlite), fix the import
          3. If tests fail due to missing DB tables, fix test setup/migrations
          4. Make minimal targeted changes only"

          if [ -n "$FILES" ]; then
            echo "Running aider with files: $FILES"
            # shellcheck disable=SC2086
            aider --model "$MODEL" \
              --yes \
              --no-show-model-warnings \
              --auto-commits \
              --map-tokens 512 \
              --commit-prompt "fix(ci): auto-fix failing tests [skip ci]" \
              --message "$PROMPT" \
              $FILES
          else
            echo "No specific files extracted — passing full error context to aider"
            aider --model "$MODEL" \
              --yes \
              --no-show-model-warnings \
              --auto-commits \
              --map-tokens 512 \
              --commit-prompt "fix(ci): auto-fix failing tests [skip ci]" \
              --message "$PROMPT"
          fi

      - name: Push branch and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f origin "$BRANCH"

          COMMITS=$(git log origin/main.."$BRANCH" --oneline 2>/dev/null | wc -l)
          if [ "$COMMITS" -eq 0 ]; then
            gh issue comment "${{ inputs.issue_number }}" \
              --body "⚠️ GPT-4o nie wprowadził żadnych zmian. Wymaga ręcznej analizy: [CI logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
              --repo "${{ github.repository }}"
            exit 0
          fi

          # Show what was changed
          DIFF_SUMMARY=$(git diff origin/main..."$BRANCH" --stat | tail -5)

          PR_URL=$(gh pr create \
            --title "fix(ci): auto-fix failing tests (issue #${{ inputs.issue_number }})" \
            --body "Closes #${{ inputs.issue_number }}

          Auto-generated by GPT-4o via \`gpt-fix\` workflow.

          **Changes:**
          \`\`\`
          ${DIFF_SUMMARY}
          \`\`\`

          **Review carefully before merging.**" \
            --head "$BRANCH" \
            --base main \
            --repo "${{ github.repository }}")

          gh issue comment "${{ inputs.issue_number }}" \
            --body "✅ PR gotowy do review: ${PR_URL}" \
            --repo "${{ github.repository }}"
