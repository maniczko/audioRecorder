name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=8192
  VITE_DATA_PROVIDER: remote
  VITE_MEDIA_PROVIDER: remote
  VITE_API_BASE_URL: http://127.0.0.1:4000
  VITE_GOOGLE_CLIENT_ID: dummy-ci.apps.googleusercontent.com
  OPENAI_API_KEY: sk-proj-dummy-ci-key-for-validating-env-123456789
  GROQ_API_KEY: gsk_dummy-ci-key-12345678901234567890
  SUPABASE_URL: https://dummy.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy.signature
  VOICELOG_API_PORT: 4000
  DATABASE_URL: postgresql://postgres:postgres@dummy.supabase.com:5432/postgres
  LANGCHAIN_API_KEY: lsv2_pt_dummy_key_1234

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate environment contract
        run: node scripts/validate-env.js
        continue-on-error: true

      - name: TypeScript frontend and backend
        run: pnpm run typecheck:all

      - name: ESLint including tests
        run: pnpm run lint:all

      - name: Prettier check
        run: pnpm run format:check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Block high and critical vulnerabilities
        run: |
          pnpm audit --audit-level=high --json > audit-report.json || true
          node - <<'NODE'
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
          const vulnerabilities = report.metadata?.vulnerabilities ?? {};
          const high = Number(vulnerabilities.high ?? 0);
          const critical = Number(vulnerabilities.critical ?? 0);

          if (high > 0 || critical > 0) {
            console.error(`High/critical vulnerabilities found: high=${high}, critical=${critical}`);
            process.exit(1);
          }

          console.log(`No high/critical vulnerabilities found. Moderate findings: ${Number(vulnerabilities.moderate ?? 0)}`);
          NODE

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit-report.json
          retention-days: 30

  frontend-tests:
    name: Frontend Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm run test:frontend:ci

  backend-tests:
    name: Backend Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run backend tests
        run: pnpm run test:server:retry

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, security, frontend-tests, backend-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7
