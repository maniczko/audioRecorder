name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm exec eslint src --max-warnings=0

  validate-workflows:
    name: Validate Workflow Guards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate Vercel workflows
        run: pnpm run test:workflows

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Vitest
        run: pnpm exec vitest run --reporter=verbose --coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend/
          retention-days: 7

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run server tests with coverage
        run: pnpm run test:server:coverage
        env:
          NODE_ENV: test
      - name: Upload server coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: coverage/server/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build production bundle
        run: pnpm run build
        env:
          NODE_ENV: production
      - name: Verify build output
        run: |
          test -f build/index.html || (echo "build/index.html missing!" && exit 1)
          du -sh build/
          find build/assets -type f -name '*.js' -exec du -h {} + | sort -rh | head -15
          find build/assets -type f -name '*.css' -exec du -h {} +
      - name: Check bundle size limits
        run: |
          TOTAL_JS=$(find build/assets -name '*.js' -exec cat {} + | wc -c)
          TOTAL_CSS=$(find build/assets -name '*.css' -exec cat {} + | wc -c)
          JS_KB=$((TOTAL_JS / 1024))
          CSS_KB=$((TOTAL_CSS / 1024))
          echo "Total JS: ${JS_KB} KB"
          echo "Total CSS: ${CSS_KB} KB"
          if [ "$JS_KB" -gt 800 ]; then
            echo "::warning::JS bundle is ${JS_KB}KB (limit: 800KB)"
          fi
          if [ "$CSS_KB" -gt 300 ]; then
            echo "::warning::CSS bundle is ${CSS_KB}KB (limit: 300KB)"
          fi
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript | ${JS_KB} KB |" >> $GITHUB_STEP_SUMMARY
          echo "| CSS | ${CSS_KB} KB |" >> $GITHUB_STEP_SUMMARY
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: build/
          retention-days: 3

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run pnpm audit (non-blocking)
        run: pnpm audit --prod || true
      - name: Check for critical vulnerabilities
        run: |
          CRITICAL=$(pnpm audit --json --prod 2>/dev/null | node -e "
            let data=''; process.stdin.on('data',c=>data+=c); process.stdin.on('end',()=>{
              try { const r=JSON.parse(data); console.log(r.metadata?.vulnerabilities?.critical||0); }
              catch(e) { console.log(0); }
            })
          ")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::warning::Found $CRITICAL critical pnpm vulnerabilities"
          fi


  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Smoke Tests
        run: pnpm run test:e2e:smoke -- --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, validate-workflows, test-frontend, test-server, build, security, e2e-smoke]
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint failed"; exit 1
          fi
          if [ "${{ needs.validate-workflows.result }}" != "success" ]; then
            echo "Workflow validation failed"; exit 1
          fi
          if [ "${{ needs.test-frontend.result }}" != "success" ]; then
            echo "Frontend tests failed"; exit 1
          fi
          if [ "${{ needs.test-server.result }}" != "success" ]; then
            echo "Server tests failed"; exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed"; exit 1
          fi
          if [ "${{ needs.e2e-smoke.result }}" != "success" ]; then
            echo "E2E smoke tests failed"; exit 1
          fi
          echo "All CI stages passed successfully."

  # ──────────────────────────────────────────────────────────────────────────
  # Railway gate: deploy only after ALL tests pass.
  #
  # Setup (one-time):
  #   1. Go to Railway → Service → Settings → General → Disable "Auto-Deploy"
  #   2. Create a Railway API token: railway.app → Account → Tokens
  #   3. Add RAILWAY_TOKEN + RAILWAY_SERVICE_ID to GitHub repo secrets
  #      (Service ID is in Railway → Service → Settings → General)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway (after CI)
    runs-on: ubuntu-latest
    needs: [ci-passed]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check Railway secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "RAILWAY_TOKEN secret not set — skipping Railway deploy."
            echo "See ci.yml comments for setup instructions."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Railway CLI
        if: steps.check_secrets.outputs.skip == 'false'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.check_secrets.outputs.skip == 'false'
        run: railway up --detach --service "${{ secrets.RAILWAY_SERVICE_ID }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
