name: 'Auto Commit & Push'

# Uruchamiany ręcznie lub z innego workflow
on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message (opcjonalne)'
        required: false
        default: ''
      branch:
        description: 'Branch do pusha'
        required: false
        default: 'main'
  workflow_call:
    inputs:
      commit_message:
        type: string
        required: false
      branch:
        type: string
        required: false
        default: 'main'

jobs:
  auto-push:
    name: 'Auto Commit & Push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ Brak zmian do commita"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📝 Wykryto zmiany:"
            git status --short
          fi

      - name: Add all changes
        if: steps.changes.outputs.has_changes == 'true'
        run: git add -A

      - name: Generate commit message
        if: steps.changes.outputs.has_changes == 'true'
        id: commit_msg
        run: |
          if [ -n "${{ inputs.commit_message }}" ]; then
            MSG="${{ inputs.commit_message }}"
          else
            # Auto-generate based on changed files
            if git diff --cached --name-only | grep -q "TASK_QUEUE.md"; then
              MSG="chore: update task queue"
            elif git diff --cached --name-only | grep -q "\.github/workflows/"; then
              MSG="ci: update workflows"
            elif git diff --cached --name-only | grep -q "src/"; then
              MSG="feat: frontend updates"
            elif git diff --cached --name-only | grep -q "server/"; then
              MSG="feat: backend updates"
            else
              MSG="chore: project updates"
            fi
          fi
          echo "message=$MSG" >> $GITHUB_OUTPUT
          echo "📝 Commit message: $MSG"

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git commit -m "${{ steps.commit_msg.outputs.message }}"
          echo "✅ Commit created: ${{ steps.commit_msg.outputs.message }}"

      - name: Check branch divergence
        if: steps.changes.outputs.has_changes == 'true'
        id: divergence
        run: |
          git fetch origin "${{ inputs.branch }}"
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/${{ inputs.branch }} 2>/dev/null || echo "")
          
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "diverged=true" >> $GITHUB_OUTPUT
            echo "⚠️ Branch diverged od remote"
          else
            echo "diverged=false" >> $GITHUB_OUTPUT
            echo "✅ Branch jest zsynchronizowany"
          fi

      - name: Pull and rebase if needed
        if: steps.changes.outputs.has_changes == 'true' && steps.divergence.outputs.diverged == 'true'
        run: |
          git pull --rebase origin "${{ inputs.branch }}"
          echo "✅ Rebase completed"

      - name: Push to GitHub
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin "${{ inputs.branch }}"
          echo "✅ Push completed successfully"
          
      - name: Create PR if diverged
        if: steps.changes.outputs.has_changes == 'true' && steps.divergence.outputs.diverged == 'true' && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Jeśli był rebase, stwórz PR zamiast direct push
          PR_URL=$(gh pr create \
            --title "${{ steps.commit_msg.outputs.message }}" \
            --body "Auto-generated by GitHub Actions" \
            --head "${{ inputs.branch }}" \
            --base "${{ inputs.branch }}" \
            --repo "${{ github.repository }}" 2>&1 || echo "")
          
          if echo "$PR_URL" | grep -q "github.com"; then
            echo "✅ PR created: $PR_URL"
          else
            echo "ℹ️  Direct push completed (PR nie był potrzebny)"
          fi

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Changes committed and pushed successfully"
          else
            echo "ℹ️  No changes to commit"
          fi
