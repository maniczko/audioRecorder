name: Deploy Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview-comment:
    name: 📝 PR Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather PR stats
        id: stats
        run: |
          CHANGED=$(git diff --shortstat origin/main...HEAD)
          FILES_CHANGED=$(git diff --name-only origin/main...HEAD | wc -l)
          TESTS_CHANGED=$(git diff --name-only origin/main...HEAD | grep -c '\.test\.' || true)
          SRC_CHANGED=$(git diff --name-only origin/main...HEAD | grep -c '^src/' || true)
          SERVER_CHANGED=$(git diff --name-only origin/main...HEAD | grep -c '^server/' || true)

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          echo "files=$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "tests=$TESTS_CHANGED" >> $GITHUB_OUTPUT
          echo "src=$SRC_CHANGED" >> $GITHUB_OUTPUT
          echo "server=$SERVER_CHANGED" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const stats = {
              changed: '${{ steps.stats.outputs.changed }}',
              files: '${{ steps.stats.outputs.files }}',
              tests: '${{ steps.stats.outputs.tests }}',
              src: '${{ steps.stats.outputs.src }}',
              server: '${{ steps.stats.outputs.server }}'
            };

            const body = `## 📊 PR Change Summary

            | Metric | Value |
            |---|---|
            | Files changed | ${stats.files} |
            | Frontend files | ${stats.src} |
            | Server files | ${stats.server} |
            | Test files touched | ${stats.tests} |
            | Diff | ${stats.changed} |

            > 🤖 Vercel will automatically create a preview deployment for this PR.
            > CI pipeline must pass before merging.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('PR Change Summary'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
