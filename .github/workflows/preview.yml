name: Preview Deployment (Vercel)

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vercel-preview:
    runs-on: ubuntu-latest
    name: Deploy Preview
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm install -g vercel@latest

      - name: Validate Vercel secrets
        shell: bash
        run: |
          missing=()
          [[ -n "${VERCEL_TOKEN}" ]] || missing+=("VERCEL_TOKEN")
          [[ -n "${VERCEL_ORG_ID}" ]] || missing+=("VERCEL_ORG_ID")
          [[ -n "${VERCEL_PROJECT_ID}" ]] || missing+=("VERCEL_PROJECT_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "## Missing Vercel secrets" >> "$GITHUB_STEP_SUMMARY"
            for secret in "${missing[@]}"; do
              echo "- Missing GitHub Actions secret: ${secret}" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Missing GitHub Actions secret: ${secret}"
            done
            exit 1
          fi

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Project Artifacts
        env:
          VITE_BUILD_ID: ${{ github.sha }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy Project Artifacts to Vercel
        id: vercel_deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview URL: ${'${{ steps.vercel_deploy.outputs.preview_url }}'}`
            })
