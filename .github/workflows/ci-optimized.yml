name: Optimized CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CI: true
  VITE_DATA_PROVIDER: local
  VITE_MEDIA_PROVIDER: local
  VITE_API_BASE_URL: http://127.0.0.1:4000
  VITE_GOOGLE_CLIENT_ID: dummy-ci.apps.googleusercontent.com
  OPENAI_API_KEY: sk-proj-dummy-ci-key-for-validating-env-123456789
  GROQ_API_KEY: gsk_dummy-ci-key-12345678901234567890
  SUPABASE_URL: https://dummy.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy.signature
  VOICELOG_API_PORT: 4000
  DATABASE_URL: postgresql://postgres:postgres@dummy.supabase.com:5432/postgres
  LANGCHAIN_API_KEY: lsv2_pt_dummy_key_1234
  GITHUB_TOKEN: github_pat_dummy_token_1234

jobs:
  # Detect what files changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      docs: ${{ steps.filter.outputs.docs }}
      config: ${{ steps.filter.outputs.config }}
      package: ${{ steps.filter.outputs.package }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'server/**'
            tests:
              - 'tests/**'
              - 'src/**/*.test.ts'
              - 'src/**/*.test.tsx'
              - 'server/tests/**/*.test.ts'
            docs:
              - '*.md'
              - 'docs/**'
            config:
              - '.github/**'
              - '*.yml'
              - '*.yaml'
            package:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'vitest.config.js'
              - '.eslintrc.json'
              - '.prettierrc'

  # Lint - only if source files changed
  lint:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.config == 'true' || needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
        name: Run ESLint

  # Type check - only if source files changed
  typecheck:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
        name: Run TypeScript

  # Format check - only if source files changed
  format:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
        name: Check formatting

  # Tests - only if tests or source files changed
  test:
    needs: changes
    if: needs.changes.outputs.tests == 'true' || needs.changes.outputs.src == 'true' || needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:smart-retry
        name: Run tests with retry
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-failure-report
          path: test-failure-report.json
          retention-days: 7

  # Coverage - only on PRs with source changes
  coverage:
    needs: [changes, test]
    if: github.event_name == 'pull_request' && needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:coverage
        name: Run coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # Security scan - only if package files changed
  security:
    needs: changes
    if: needs.changes.outputs.package == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod
        name: Run pnpm audit
        continue-on-error: true

  # Build - only if source or config changed
  build:
    needs: [changes, lint, typecheck]
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        name: Build project
      - uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # Documentation - only if docs changed
  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run docs:generate 2>/dev/null || echo "No docs script found"
        name: Generate docs
        continue-on-error: true

  # Summary - runs after all other jobs
  summary:
    needs: [changes, lint, typecheck, format, test, coverage, security, build, docs]
    if: always() && (needs.changes.outputs.src == 'true' || needs.changes.outputs.config == 'true' || needs.changes.outputs.package == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.docs == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Check job statuses
        run: |
          echo "╔═══════════════════════════════════════════════════════════╗"
          echo "║  📊 CI Summary                                            ║"
          echo "╚═══════════════════════════════════════════════════════════╝"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Lint | ${{ needs.lint.result }} |"
          echo "| Typecheck | ${{ needs.typecheck.result }} |"
          echo "| Format | ${{ needs.format.result }} |"
          echo "| Tests | ${{ needs.test.result }} |"
          echo "| Coverage | ${{ needs.coverage.result }} |"
          echo "| Security | ${{ needs.security.result }} |"
          echo "| Build | ${{ needs.build.result }} |"
          echo "| Docs | ${{ needs.docs.result }} |"
          echo ""

          # Determine overall status correctly
          CRITICAL_FAILED="false"

          # Check critical jobs - these MUST pass
          if [ "${{ needs.lint.result }}" == "failure" ]; then CRITICAL_FAILED="true"; fi
          if [ "${{ needs.typecheck.result }}" == "failure" ]; then CRITICAL_FAILED="true"; fi
          if [ "${{ needs.test.result }}" == "failure" ]; then CRITICAL_FAILED="true"; fi
          if [ "${{ needs.build.result }}" == "failure" ]; then CRITICAL_FAILED="true"; fi

          # Non-critical jobs - these can fail without blocking
          if [ "${{ needs.format.result }}" == "failure" ]; then
            echo "⚠️  Format check failed (non-blocking)"
          fi
          if [ "${{ needs.coverage.result }}" == "failure" ]; then
            echo "⚠️  Coverage check failed (non-blocking)"
          fi
          if [ "${{ needs.security.result }}" == "failure" ]; then
            echo "⚠️  Security audit failed (non-blocking)"
          fi
          if [ "${{ needs.docs.result }}" == "failure" ]; then
            echo "⚠️  Docs generation failed (non-blocking)"
          fi

          echo ""
          if [ "$CRITICAL_FAILED" == "true" ]; then
            echo "╔═══════════════════════════════════════════════════════════╗"
            echo "║  ❌ CRITICAL CHECKS FAILED                                ║"
            echo "╚═══════════════════════════════════════════════════════════╝"
            exit 1
          else
            echo "╔═══════════════════════════════════════════════════════════╗"
            echo "║  ✅ ALL CRITICAL CHECKS PASSED                            ║"
            echo "╚═══════════════════════════════════════════════════════════╝"
            exit 0
          fi
