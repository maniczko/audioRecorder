name: Optimized CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CI: true

jobs:
  # Detect what files changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      docs: ${{ steps.filter.outputs.docs }}
      config: ${{ steps.filter.outputs.config }}
      package: ${{ steps.filter.outputs.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'server/**'
            tests:
              - 'tests/**'
              - 'src/**/*.test.ts'
              - 'src/**/*.test.tsx'
              - 'server/tests/**/*.test.ts'
            docs:
              - '*.md'
              - 'docs/**'
            config:
              - '.github/**'
              - '*.yml'
              - '*.yaml'
            package:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'vitest.config.js'
              - '.eslintrc.json'
              - '.prettierrc'

  # Lint - only if source files changed
  lint:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.config == 'true' || needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm run lint
        name: Run ESLint

  # Type check - only if source files changed
  typecheck:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm run typecheck
        name: Run TypeScript

  # Format check - only if source files changed
  format:
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm run format:check
        name: Check formatting

  # Tests - only if tests or source files changed
  test:
    needs: changes
    if: needs.changes.outputs.tests == 'true' || needs.changes.outputs.src == 'true' || needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm run test:smart-retry
        name: Run tests with retry
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-failure-report
          path: test-failure-report.json
          retention-days: 7

  # Coverage - only on PRs with source changes
  coverage:
    needs: [changes, test]
    if: github.event_name == 'pull_request' && needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm run test:coverage
        name: Run coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # Security scan - only if package files changed
  security:
    needs: changes
    if: needs.changes.outputs.package == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm audit --audit-level=high
        name: Run npm audit
        continue-on-error: true

  # Build - only if source or config changed
  build:
    needs: [changes, lint, typecheck]
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm run build
        name: Build project
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # Documentation - only if docs changed
  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npm run docs:generate 2>/dev/null || echo "No docs script found"
        name: Generate docs
        continue-on-error: true

  # Summary - runs after all other jobs
  summary:
    needs: [changes, lint, typecheck, format, test, coverage, security, build, docs]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job statuses
        run: |
          echo "## CI Summary"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Lint | ${{ needs.lint.result }} |"
          echo "| Typecheck | ${{ needs.typecheck.result }} |"
          echo "| Format | ${{ needs.format.result }} |"
          echo "| Tests | ${{ needs.test.result }} |"
          echo "| Coverage | ${{ needs.coverage.result }} |"
          echo "| Security | ${{ needs.security.result }} |"
          echo "| Build | ${{ needs.build.result }} |"
          echo "| Docs | ${{ needs.docs.result }} |"
          echo ""
          
          # Check if any critical jobs failed
          if [ "${{ needs.lint.result }}" == "failure" ] || [ "${{ needs.typecheck.result }}" == "failure" ] || [ "${{ needs.test.result }}" == "failure" ]; then
            echo "❌ Critical checks failed"
            exit 1
          else
            echo "✅ All critical checks passed"
            exit 0
          fi
