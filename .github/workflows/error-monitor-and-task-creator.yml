name: Error Monitor & Task Creator

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      check_github:
        description: 'Check GitHub Actions errors'
        required: false
        default: 'true'
        type: boolean
      check_railway:
        description: 'Check Railway errors'
        required: false
        default: 'true'
        type: boolean
      check_vercel:
        description: 'Check Vercel errors'
        required: false
        default: 'true'
        type: boolean
      check_sentry:
        description: 'Check Sentry errors'
        required: false
        default: 'true'
        type: boolean
      create_tasks:
        description: 'Create tasks in TASK_QUEUE.md'
        required: false
        default: 'true'
        type: boolean
      create_issues:
        description: 'Create GitHub issues for errors'
        required: false
        default: 'true'
        type: boolean

jobs:
  monitor-and-create-tasks:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Railway CLI
        if: ${{ github.event.inputs.check_railway != 'false' }}
        run: npm install -g @railway/cli

      - name: Login to Railway
        if: ${{ github.event.inputs.check_railway != 'false' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN is set and Railway CLI can authenticate automatically"
          else
            echo "RAILWAY_TOKEN not set, skipping Railway operations"
          fi

      - name: Link to Railway project
        if: ${{ github.event.inputs.check_railway != 'false' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: '6c73db42-8183-4e3b-b546-5edaa616cfe4'
        run: |
          if [ -n "$RAILWAY_TOKEN" ]; then
            railway link --project "$RAILWAY_PROJECT_ID" || echo "Skipping link, using project ID directly"
          else
            echo "RAILWAY_TOKEN not set, skipping Railway link"
          fi

      - name: Fetch GitHub Errors
        if: ${{ github.event.inputs.check_github != 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          DAYS_BACK: 1
        run: node scripts/fetch-github-errors.js --verbose
        continue-on-error: true

      - name: Fetch Railway Errors
        if: ${{ github.event.inputs.check_railway != 'false' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: '6c73db42-8183-4e3b-b546-5edaa616cfe4'
          RAILWAY_LOG_LINES: 50
          RAILWAY_LOG_FILTER: '@level:error'
          OUTPUT_DIR: ./railway-errors
        run: node scripts/fetch-railway-errors.js --verbose
        continue-on-error: true

      - name: Fetch Vercel Errors
        if: ${{ github.event.inputs.check_vercel != 'false' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: audiorecorder
          VERCEL_HOURS_BACK: 2
          OUTPUT_DIR: ./vercel-errors
        run: node scripts/fetch-vercel-errors.js --verbose
        continue-on-error: true

      - name: Fetch Sentry Errors
        if: ${{ github.event.inputs.check_sentry != 'false' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG || 'vatlar' }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_HOURS_BACK: 2
          OUTPUT_DIR: ./sentry-errors
        run: node scripts/fetch-sentry-errors.js --verbose
        continue-on-error: true

      - name: Parse and Analyze Errors
        id: analyze
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function readLatestJson(dirPath) {
              if (!fs.existsSync(dirPath)) return null;
              const files = fs
                .readdirSync(dirPath)
                .filter((file) => file.endsWith('.json'))
                .sort()
                .reverse();
              if (files.length === 0) return null;
              return JSON.parse(fs.readFileSync(path.join(dirPath, files[0]), 'utf8'));
            }

            const errors = {
              github: [],
              railway: [],
              vercel: [],
              sentry: [],
              timestamp: new Date().toISOString(),
            };

            try {
              const latest = readLatestJson('./github-errors');
              if (Array.isArray(latest)) {
                errors.github = latest.slice(0, 10);
              } else if (latest && latest.failures) {
                errors.github = latest.failures
                  .slice(0, 10)
                  .flatMap((failure) =>
                    (failure.errors || [{ jobName: 'unknown', stepName: 'unknown', errors: [] }]).map((entry) => ({
                      workflow: failure.runName || 'Unknown Workflow',
                      message:
                        (entry.errors || [])
                          .map((err) => err.line || err.message || '')
                          .filter(Boolean)
                          .join('\n') ||
                        `Job "${entry.jobName}" step "${entry.stepName}" failed`,
                      url: failure.htmlUrl,
                    }))
                  )
                  .slice(0, 10);
              }
            } catch (error) {
              console.log('Could not parse GitHub errors:', error.message);
            }

            try {
              const latest = readLatestJson('./railway-errors');
              if (Array.isArray(latest)) {
                errors.railway = latest.slice(0, 10);
              }
            } catch (error) {
              console.log('Could not parse Railway errors:', error.message);
            }

            try {
              const latest = readLatestJson('./vercel-errors');
              if (Array.isArray(latest)) {
                errors.vercel = latest.slice(0, 10);
              }
            } catch (error) {
              console.log('Could not parse Vercel errors:', error.message);
            }

            try {
              const latest = readLatestJson('./sentry-errors');
              if (Array.isArray(latest)) {
                errors.sentry = latest.slice(0, 10);
              }
            } catch (error) {
              console.log('Could not parse Sentry errors:', error.message);
            }

            const githubErrorCount = errors.github.length;
            const railwayErrorCount = errors.railway.length;
            const vercelErrorCount = errors.vercel.length;
            const sentryErrorCount = errors.sentry.length;
            const totalErrors = githubErrorCount + railwayErrorCount + vercelErrorCount + sentryErrorCount;

            console.log(
              `Found ${githubErrorCount} GitHub, ${railwayErrorCount} Railway, ${vercelErrorCount} Vercel, ${sentryErrorCount} Sentry errors`
            );

            fs.writeFileSync('./error-analysis.json', JSON.stringify(errors, null, 2));

            core.setOutput('github_errors', githubErrorCount);
            core.setOutput('railway_errors', railwayErrorCount);
            core.setOutput('vercel_errors', vercelErrorCount);
            core.setOutput('sentry_errors', sentryErrorCount);
            core.setOutput('total_errors', totalErrors);
            core.setOutput('has_errors', totalErrors > 0 ? 'true' : 'false');

      - name: Create Tasks in TASK_QUEUE.md
        if: ${{ steps.analyze.outputs.has_errors == 'true' && github.event.inputs.create_tasks != 'false' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { classifyError } = require('./scripts/error-remediation.cjs');
            const errors = JSON.parse(fs.readFileSync('./error-analysis.json', 'utf8'));
            const timestamp = new Date().toISOString();
            const dateStr = timestamp.split('T')[0];

            let taskQueue = '';
            try {
              taskQueue = fs.readFileSync('./TASK_QUEUE.md', 'utf8');
            } catch (_) {
              taskQueue =
                '# TASK_QUEUE\n\nLegenda statusow: `todo`, `in_progress`, `done`, `blocked`\n\n## Otwarta kolejka\n\n### 🔴 Wysoki priorytet\n\n';
            }

            let taskDone = '';
            try {
              taskDone = fs.readFileSync('./TASK_DONE.md', 'utf8');
            } catch (_) {}

            function fingerprint(value) {
              return String(value || '').substring(0, 80).replace(/\s+/g, ' ').trim();
            }

            function isAlreadyTracked(value) {
              const key = fingerprint(value);
              return !key ? false : taskQueue.includes(key) || taskDone.includes(key);
            }

            function cleanInline(text, max = 220) {
              const normalized = String(text || '').replace(/\s+/g, ' ').trim();
              if (!normalized) return 'Brak szczegolow.';
              return normalized.substring(0, max) + (normalized.length > max ? '...' : '');
            }

            function buildTaskDescription(source, title, details) {
              const summary = cleanInline(title, 140);
              const context = cleanInline(details, 260);
              return `${source}: ${summary}. Szczegoly: ${context}`;
            }

            function appendRoutingMetadata(classification) {
              return (
                `  - **Automation:** \`${classification.automation}\`\n` +
                `  - **Dispatch mode:** \`${classification.dispatchMode}\`\n` +
                `  - **Priority:** \`${classification.priority}\`\n` +
                `  - **Routing reason:** ${cleanInline(classification.reason, 180)}\n`
              );
            }

            let newTasks = `\n<!-- Auto-generated on ${timestamp} -->\n`;
            let taskNumber = 1;
            let addedCount = 0;

            const newGhErrors = errors.github.filter((e) => !isAlreadyTracked(e.message || e.line || ''));
            if (newGhErrors.length > 0) {
              newTasks += `\n### GitHub Actions Errors (${newGhErrors.length} found)\n\n`;
              newGhErrors.forEach((error) => {
                const taskNum = `GH-AUTO-${dateStr}-${taskNumber++}`;
                const workflowName = error.workflow || 'Unknown Workflow';
                const errorMsg = error.message || error.line || 'Unknown error';
                const classification = classifyError({
                  source: 'github',
                  workflow: workflowName,
                  message: errorMsg,
                });
                newTasks += `- **${taskNum}** — Fix ${workflowName} failure\n`;
                newTasks += `  - **Status:** \`todo\`\n`;
                newTasks += `  - **Source:** \`GitHub Actions\`\n`;
                newTasks += appendRoutingMetadata(classification);
                newTasks += `  - **Opis zadania:** ${buildTaskDescription('GitHub Actions', workflowName, errorMsg)}\n`;
                newTasks += `  - **Error:** ${cleanInline(errorMsg, 200)}\n`;
                if (error.url) newTasks += `  - **Link:** ${error.url}\n`;
                newTasks += `  - **Created:** ${timestamp}\n`;
                newTasks += '\n';
                addedCount += 1;
              });
            }

            const newRwErrors = errors.railway.filter((e) => !isAlreadyTracked(e.message || ''));
            if (newRwErrors.length > 0) {
              newTasks += `\n### Railway Errors (${newRwErrors.length} found)\n\n`;
              newRwErrors.forEach((error) => {
                const taskNum = `RW-AUTO-${dateStr}-${taskNumber++}`;
                const errorMsg = error.message || 'Unknown Railway error';
                const classification = classifyError({
                  source: 'railway',
                  workflow: 'Railway runtime',
                  message: errorMsg,
                });
                newTasks += `- **${taskNum}** — Fix Railway error\n`;
                newTasks += `  - **Status:** \`todo\`\n`;
                newTasks += `  - **Source:** \`Railway\`\n`;
                newTasks += appendRoutingMetadata(classification);
                newTasks += `  - **Opis zadania:** ${buildTaskDescription('Railway', 'Blad runtime lub deployu', errorMsg)}\n`;
                newTasks += `  - **Error:** ${cleanInline(errorMsg, 200)}\n`;
                newTasks += `  - **Created:** ${timestamp}\n`;
                newTasks += '\n';
                addedCount += 1;
              });
            }

            const newVlErrors = errors.vercel.filter((e) => !isAlreadyTracked(e.text || ''));
            if (newVlErrors.length > 0) {
              newTasks += `\n### Vercel Errors (${newVlErrors.length} found)\n\n`;
              newVlErrors.forEach((error) => {
                const taskNum = `VL-AUTO-${dateStr}-${taskNumber++}`;
                const errorMsg = error.text || 'Unknown Vercel error';
                const classification = classifyError({
                  source: 'vercel',
                  workflow: 'Vercel deployment',
                  message: errorMsg,
                });
                newTasks += `- **${taskNum}** — Fix Vercel deployment error\n`;
                newTasks += `  - **Status:** \`todo\`\n`;
                newTasks += `  - **Source:** \`Vercel\`\n`;
                newTasks += appendRoutingMetadata(classification);
                newTasks += `  - **Opis zadania:** ${buildTaskDescription('Vercel', 'Blad buildu lub deploymentu', errorMsg)}\n`;
                newTasks += `  - **Error:** ${cleanInline(errorMsg, 200)}\n`;
                if (error.deploymentId) newTasks += `  - **Deployment:** ${error.deploymentId}\n`;
                newTasks += `  - **Created:** ${timestamp}\n`;
                newTasks += '\n';
                addedCount += 1;
              });
            }

            const newStErrors = errors.sentry.filter((e) => !isAlreadyTracked(e.message || e.title || ''));
            if (newStErrors.length > 0) {
              newTasks += `\n### Sentry Errors (${newStErrors.length} found)\n\n`;
              newStErrors.forEach((error) => {
                const taskNum = `ST-AUTO-${dateStr}-${taskNumber++}`;
                const title = error.title || 'Unknown Sentry error';
                const errorMsg = error.message || title;
                const classification = classifyError({
                  source: 'sentry',
                  workflow: title,
                  message: errorMsg,
                });
                newTasks += `- **${taskNum}** — Fix Sentry error: ${title}\n`;
                newTasks += `  - **Status:** \`todo\`\n`;
                newTasks += `  - **Source:** \`Sentry (${error.project || 'unknown'})\`\n`;
                newTasks += appendRoutingMetadata(classification);
                newTasks += `  - **Opis zadania:** ${buildTaskDescription(`Sentry/${error.project || 'unknown'}`, title, errorMsg)}\n`;
                newTasks += `  - **Type:** ${error.type || 'unknown'}\n`;
                newTasks += `  - **Message:** ${cleanInline(errorMsg, 200)}\n`;
                newTasks += `  - **Count:** ${error.count || 1}\n`;
                if (error.firstSeen) newTasks += `  - **First Seen:** ${error.firstSeen}\n`;
                if (error.lastSeen) newTasks += `  - **Last Seen:** ${error.lastSeen}\n`;
                if (error.url) newTasks += `  - **Link:** ${error.url}\n`;
                newTasks += `  - **Created:** ${timestamp}\n`;
                newTasks += '\n';
                addedCount += 1;
              });
            }

            if (addedCount === 0) {
              console.log('All errors already tracked in TASK_QUEUE.md or TASK_DONE.md, no new tasks added.');
              return;
            }

            const preferredAnchors = ['### 🔴 Wysoki priorytet', '## Aktualne Zadania', '## Otwarta kolejka'];
            let insertIndex = -1;
            let anchorLength = 0;

            for (const anchor of preferredAnchors) {
              insertIndex = taskQueue.indexOf(anchor);
              if (insertIndex !== -1) {
                anchorLength = anchor.length;
                break;
              }
            }

            if (insertIndex !== -1) {
              const endOfLine = taskQueue.indexOf('\n', insertIndex + anchorLength);
              const updatedQueue =
                taskQueue.slice(0, endOfLine + 1) + newTasks + taskQueue.slice(endOfLine + 1);
              fs.writeFileSync('./TASK_QUEUE.md', updatedQueue);
            } else {
              fs.writeFileSync('./TASK_QUEUE.md', taskQueue.trimEnd() + '\n' + newTasks + '\n');
            }

            console.log(`Created ${addedCount} new tasks in TASK_QUEUE.md`);

      - name: Commit TASK_QUEUE.md changes
        if: ${{ steps.analyze.outputs.has_errors == 'true' && github.event.inputs.create_tasks != 'false' }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add TASK_QUEUE.md
          git commit --no-verify -m "chore: auto-create tasks for ${{ steps.analyze.outputs.total_errors }} errors" || echo "No changes to commit"
          GIT_TOKEN="${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}"
          git remote set-url origin https://x-access-token:${GIT_TOKEN}@github.com/${{ github.repository }}.git
          git push origin ${{ github.ref_name }} --no-verify 2>&1 || echo "Push failed or no changes"

      - name: Create GitHub Issues for Errors
        if: ${{ steps.analyze.outputs.has_errors == 'true' && github.event.inputs.create_issues != 'false' }}
        uses: actions/github-script@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const errors = JSON.parse(fs.readFileSync('./error-analysis.json', 'utf8'));
            const timestamp = new Date().toISOString();
            const dateStr = timestamp.split('T')[0];

            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-generated-error',
            });

            const todayIssues = existingIssues.filter((issue) => issue.created_at.startsWith(dateStr));
            if (todayIssues.length > 0) {
              console.log(`Skipping issue creation, ${todayIssues.length} issues already created today`);
              return;
            }

            let issueBody = `## Automated Error Report\n\n`;
            issueBody += `**Generated:** ${timestamp}\n\n`;

            if (errors.github.length > 0) {
              issueBody += `### GitHub Actions Errors (${errors.github.length})\n\n`;
              errors.github.forEach((error, idx) => {
                issueBody += `#### Error ${idx + 1}\n`;
                issueBody += `\`\`\`\n${error.message || error.line || 'Unknown'}\n\`\`\`\n`;
                issueBody += `**Workflow:** ${error.workflow || 'Unknown'}\n\n`;
                if (error.url) issueBody += `**Run:** ${error.url}\n\n`;
              });
            }

            if (errors.railway.length > 0) {
              issueBody += `### Railway Errors (${errors.railway.length})\n\n`;
              errors.railway.forEach((error, idx) => {
                issueBody += `#### Error ${idx + 1}\n`;
                issueBody += `\`\`\`\n${error.message || 'Unknown Railway error'}\n\`\`\`\n`;
              });
            }

            if (errors.vercel.length > 0) {
              issueBody += `### Vercel Errors (${errors.vercel.length})\n\n`;
              errors.vercel.forEach((error, idx) => {
                issueBody += `#### Error ${idx + 1}\n`;
                issueBody += `\`\`\`\n${error.text || 'Unknown Vercel error'}\n\`\`\`\n`;
                if (error.deploymentId) issueBody += `**Deployment:** ${error.deploymentId}\n\n`;
              });
            }

            if (errors.sentry.length > 0) {
              issueBody += `### Sentry Errors (${errors.sentry.length})\n\n`;
              errors.sentry.forEach((error, idx) => {
                issueBody += `#### Error ${idx + 1}: ${error.title}\n`;
                issueBody += `**Project:** \`${error.project}\`\n`;
                issueBody += `**Type:** \`${error.type || 'unknown'}\`\n`;
                issueBody += `**Count:** ${error.count || 1}\n`;
                issueBody += `\`\`\`\n${error.message || 'No message'}\n\`\`\`\n`;
                if (error.url) issueBody += `**Sentry Link:** ${error.url}\n\n`;
              });
            }

            issueBody += `---\n\n`;
            issueBody += `Tasks were added to TASK_QUEUE.md when new unique errors were detected.\n`;

            const total =
              errors.github.length + errors.railway.length + errors.vercel.length + errors.sentry.length;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto Error Report: ${errors.github.length} GitHub + ${errors.railway.length} Railway + ${errors.vercel.length} Vercel + ${errors.sentry.length} Sentry (${dateStr})`,
              body: issueBody,
              labels: ['auto-generated-error', 'monitoring', 'priority-high'],
            });

            console.log(`Created issue #${issue.number} for ${total} detected errors`);

      - name: Upload Error Analysis
        uses: actions/upload-artifact@v7
        if: ${{ steps.analyze.outputs.has_errors == 'true' }}
        with:
          name: error-analysis-${{ github.run_id }}
          path: |
            error-analysis.json
            github-errors/*.md
            github-errors/*.json
            railway-errors/*.md
            railway-errors/*.json
            vercel-errors/*.md
            vercel-errors/*.json
            sentry-errors/*.md
            sentry-errors/*.json
          retention-days: 7

      - name: Summary
        if: ${{ always() }}
        run: |
          echo "## Error Monitor Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Errors Found |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------------|" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Actions | ${{ steps.analyze.outputs.github_errors || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway | ${{ steps.analyze.outputs.railway_errors || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel | ${{ steps.analyze.outputs.vercel_errors || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sentry | ${{ steps.analyze.outputs.sentry_errors || 0 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **${{ steps.analyze.outputs.total_errors || 0 }}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.analyze.outputs.has_errors }}" = "true" ]; then
            echo "Tasks were added to TASK_QUEUE.md when new unique errors were found." >> $GITHUB_STEP_SUMMARY
          else
            echo "No errors found in monitored systems." >> $GITHUB_STEP_SUMMARY
          fi
