name: GitHub Error Reporter

on:
  schedule:
    - cron: '0 9 * * *' # Daily at 9 AM
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Number of days to look back'
        required: false
        default: '7'
        type: number
      create_issue:
        description: 'Create or update GitHub issues for active failure groups'
        required: false
        default: 'true'
        type: boolean

jobs:
  fetch-errors:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      issues: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch GitHub errors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          DAYS_BACK: ${{ github.event.inputs.days_back || 7 }}
        run: node scripts/fetch-github-errors.js --verbose

      - name: Upload error reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: github-error-reports
          path: github-errors/
          retention-days: 30

      - name: Upsert grouped issues for failures
        if: ${{ github.event.inputs.create_issue != 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: node scripts/upsert-monitoring-issues.mjs --provider github-actions --reports-dir github-errors
