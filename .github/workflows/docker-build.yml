name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build & Verify Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Check disk space
        run: |
          echo "╔═══════════════════════════════════════════════════════════╗"
          echo "║  💾 Checking Disk Space                                   ║"
          echo "╚═══════════════════════════════════════════════════════════╝"
          df -h
          echo ""
          AVAILABLE=$(df / | tail -1 | awk '{print $4}')
          echo "Available space: ${AVAILABLE}K"
          if [ "$AVAILABLE" -lt "10000000" ]; then
            echo "⚠️  Warning: Less than 10GB available!"
          else
            echo "✅ Disk space OK"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: Build Docker image
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: voicelog:test
          load: true
          provenance: false
          sbom: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Verify Docker image size
        run: |
          echo "╔═══════════════════════════════════════════════════════════╗"
          echo "║  📦 Docker Image Size                                     ║"
          echo "╚═══════════════════════════════════════════════════════════╝"
          docker images voicelog:test
          SIZE=$(docker images voicelog:test --format "{{.Size}}")
          echo "Image size: $SIZE"

      - name: Verify binaries present in image
        run: |
          echo "╔═══════════════════════════════════════════════════════════╗"
          echo "║  🔧 Verifying Binaries                                    ║"
          echo "╚═══════════════════════════════════════════════════════════╝"

          # Check Node.js (required) - use shell entrypoint to run command
          echo "Checking Node.js..."
          docker run --rm --entrypoint /bin/sh voicelog:test -c "node --version" || (echo "❌ Node.js not found" && exit 1)

          # Note: pnpm is only in the build stage, not in runtime (multi-stage Docker build)

          # Optional: Check ffmpeg if available
          echo "Checking ffmpeg (optional)..."
          docker run --rm --entrypoint /bin/sh voicelog:test -c "ffmpeg -version 2>/dev/null | head -1" || echo "⚠️  ffmpeg not found (optional)"

          echo ""
          echo "✅ Core binaries verified!"
