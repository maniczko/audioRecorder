name: AI Auto-Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  ai-auto-fix:
    runs-on: ubuntu-latest
    env:
      CI: true
      VITE_DATA_PROVIDER: local
      VITE_MEDIA_PROVIDER: local
      VITE_API_BASE_URL: http://127.0.0.1:4000
      VITE_GOOGLE_CLIENT_ID: dummy-ci.apps.googleusercontent.com
      OPENAI_API_KEY: sk-proj-dummy-ci-key-for-validating-env-123456789
      GROQ_API_KEY: gsk_dummy-ci-key-12345678901234567890
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy.signature
      VOICELOG_API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@dummy.supabase.com:5432/postgres
      LANGCHAIN_API_KEY: lsv2_pt_dummy_key_1234
      GITHUB_TOKEN: github_pat_dummy_token_1234
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint and capture errors
        id: lint
        run: |
          pnpm run lint 2>&1 | tee lint-output.txt || true
          echo "has_errors=$([ -s lint-output.txt ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Run TypeScript check and capture errors
        id: typecheck
        run: |
          pnpm run typecheck 2>&1 | tee typecheck-output.txt || true
          echo "has_errors=$([ -s typecheck-output.txt ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Auto-fix ESLint errors
        if: steps.lint.outputs.has_errors == 'true'
        run: |
          echo "🔧 Auto-fixing ESLint errors..."
          pnpm run lint:fix || true

      - name: Auto-fix formatting
        run: |
          echo "🔧 Auto-fixing formatting..."
          pnpm run format || true

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit auto-fixes
        if: steps.git-check.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: auto-fix lint and formatting issues [skip ci]'
          commit_options: '--no-verify'
          file_pattern: '*.ts *.tsx *.js *.jsx'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Run tests after fix
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          echo "🧪 Running tests after auto-fix..."
          pnpm run test:smart-retry || true

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const lintErrors = fs.existsSync('lint-output.txt') ? fs.readFileSync('lint-output.txt', 'utf8') : '';
            const typeErrors = fs.existsSync('typecheck-output.txt') ? fs.readFileSync('typecheck-output.txt', 'utf8') : '';

            const hasLintErrors = lintErrors.trim().length > 0;
            const hasTypeErrors = typeErrors.trim().length > 0;

            let comment = '## 🤖 AI Auto-Fix Report\n\n';

            if (hasLintErrors || hasTypeErrors) {
              comment += '### Issues Found:\n\n';
              
              if (hasLintErrors) {
                comment += '#### ESLint Errors\n';
                comment += '```\n';
                comment += lintErrors.substring(0, 1000);
                comment += '\n```\n\n';
              }
              
              if (hasTypeErrors) {
                comment += '#### TypeScript Errors\n';
                comment += '```\n';
                comment += typeErrors.substring(0, 1000);
                comment += '\n```\n\n';
              }
              
              comment += '### Actions Taken:\n';
              comment += '- ✅ Auto-fixed ESLint errors\n';
              comment += '- ✅ Auto-fixed formatting issues\n';
              comment += '- ✅ Ran tests after fixes\n\n';
              comment += '---\n*This is an automated comment. Please review the changes.*\n';
            } else {
              comment += '### ✅ No Issues Found!\n\n';
              comment += 'Your code passes all lint and type checks.\n\n';
              comment += '---\n*This is an automated comment.*\n';
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
