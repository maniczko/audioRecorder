name: AI Auto-Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  ai-auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint and capture errors
        id: lint
        run: |
          npm run lint 2>&1 | tee lint-output.txt || true
          echo "has_errors=$([ -s lint-output.txt ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
      
      - name: Run TypeScript check and capture errors
        id: typecheck
        run: |
          npm run typecheck 2>&1 | tee typecheck-output.txt || true
          echo "has_errors=$([ -s typecheck-output.txt ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
      
      - name: Auto-fix ESLint errors
        if: steps.lint.outputs.has_errors == 'true'
        run: |
          echo "🔧 Auto-fixing ESLint errors..."
          npm run lint:fix || true
      
      - name: Auto-fix formatting
        run: |
          echo "🔧 Auto-fixing formatting..."
          npm run format || true
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit auto-fixes
        if: steps.git-check.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix lint and formatting issues [skip ci]"
          commit_options: "--no-verify"
          file_pattern: "*.ts *.tsx *.js *.jsx"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
      
      - name: Run tests after fix
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          echo "🧪 Running tests after auto-fix..."
          npm run test:smart-retry || true
      
      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const lintErrors = require('fs').readFileSync('lint-output.txt', 'utf8');
            const typeErrors = require('fs').readFileSync('typecheck-output.txt', 'utf8');
            
            const hasLintErrors = lintErrors.trim().length > 0;
            const hasTypeErrors = typeErrors.trim().length > 0;
            
            let comment = '## 🤖 AI Auto-Fix Report\n\n';
            
            if (hasLintErrors || hasTypeErrors) {
              comment += '### Issues Found:\n\n';
              
              if (hasLintErrors) {
                comment += '#### ESLint Errors\n';
                comment += '```\n';
                comment += lintErrors.substring(0, 1000);
                comment += '\n```\n\n';
              }
              
              if (hasTypeErrors) {
                comment += '#### TypeScript Errors\n';
                comment += '```\n';
                comment += typeErrors.substring(0, 1000);
                comment += '\n```\n\n';
              }
              
              comment += '### Actions Taken:\n';
              comment += '- ✅ Auto-fixed ESLint errors\n';
              comment += '- ✅ Auto-fixed formatting issues\n';
              comment += '- ✅ Ran tests after fixes\n\n';
              comment += '---\n*This is an automated comment. Please review the changes.*\n';
            } else {
              comment += '### ✅ No Issues Found!\n\n';
              comment += 'Your code passes all lint and type checks.\n\n';
              comment += '---\n*This is an automated comment.*\n';
            }
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
