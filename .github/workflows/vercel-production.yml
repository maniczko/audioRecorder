name: Production Deployment (Vercel)

# Trigger ONLY after CI Pipeline passes — never deploy broken code.
on:
  workflow_run:
    workflows: ['CI/CD Pipeline']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  vercel-production:
    runs-on: ubuntu-latest
    name: Deploy Production
    # Skip if triggered by a failed CI run (workflow_dispatch always runs)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Deploy the exact SHA that CI tested, not whatever is on main at deploy time
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm install -g vercel@latest

      - name: Validate Vercel secrets
        shell: bash
        run: |
          missing=()
          [[ -n "${VERCEL_TOKEN}" ]] || missing+=("VERCEL_TOKEN")
          [[ -n "${VERCEL_ORG_ID}" ]] || missing+=("VERCEL_ORG_ID")
          [[ -n "${VERCEL_PROJECT_ID}" ]] || missing+=("VERCEL_PROJECT_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "## Missing Vercel secrets" >> "$GITHUB_STEP_SUMMARY"
            for secret in "${missing[@]}"; do
              echo "- Missing GitHub Actions secret: ${secret}" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Missing GitHub Actions secret: ${secret}"
            done
            exit 1
          fi

      - name: Pull Vercel Production Environment Information
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Project Artifacts
        env:
          VITE_BUILD_ID: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Project Artifacts to Vercel Production
        id: vercel_deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "production_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Publish deployment summary
        run: |
          echo "## Vercel Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production URL: ${{ steps.vercel_deploy.outputs.production_url }}" >> $GITHUB_STEP_SUMMARY
