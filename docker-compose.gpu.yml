# Docker Compose GPU Configuration (Task #304)
# Usage: docker-compose -f docker-compose.gpu.yml up -d
# Requires: NVIDIA GPU, NVIDIA Container Toolkit

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: voicelog-api:gpu
    init: true
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      VOICELOG_API_HOST: 0.0.0.0
      VOICELOG_API_PORT: 4000
      VOICELOG_DB_PATH: /data/voicelog.sqlite
      VOICELOG_UPLOAD_DIR: /data/uploads
      VOICELOG_DEBUG: 'true'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      # GPU acceleration flags
      USE_GPU: 'true'
      CUDA_VISIBLE_DEVICES: '0'
    volumes:
      - voicelog_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const port = Number(process.env.PORT || 4000);
          const http = require('node:http');
          const req = http.get({ host: '127.0.0.1', port, path: '/health', timeout: 5000 },
          (res) => process.exit(res.statusCode === 200 ? 0 : 1));
          req.on('error', () => process.exit(1));
          req.on('timeout', () => { req.destroy(); process.exit(1));"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    restart: unless-stopped
    runtime: nvidia

volumes:
  voicelog_data:
