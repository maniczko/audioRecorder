services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: voicelog-api:local
    init: true
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      VOICELOG_API_HOST: 0.0.0.0
      VOICELOG_API_PORT: 4000
      VOICELOG_DB_PATH: /data/voicelog.sqlite
      VOICELOG_UPLOAD_DIR: /data/uploads
      VOICELOG_DEBUG: 'true'
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - voicelog_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const port = Number(process.env.PORT || process.env.VOICELOG_API_PORT || 4000);
          const http = require('node:http');
          const req = http.get({ host: '127.0.0.1', port, path: '/health', timeout: 5000 },
          (res) => process.exit(res.statusCode === 200 ? 0 : 1));
          req.on('error', () => process.exit(1));
          req.on('timeout', () => { req.destroy(); process.exit(1); });"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    # [103] Resource limits to prevent DoS
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

volumes:
  voicelog_data:
