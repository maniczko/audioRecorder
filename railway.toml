# Railway Configuration
# https://docs.railway.app/guides/configure

[build]
builder = "NIXPACKS"
# Build backend artifact used by runtime start command.
buildCommand = "pnpm exec esbuild server/index.ts server/sqliteWorker.ts --bundle --platform=node --format=esm --outdir=dist-server --packages=external"

[deploy]
startCommand = "node dist-server/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables
[deploy.envs]
NODE_ENV = "production"
VOICELOG_API_PORT = "4000"
VOICELOG_ALLOWED_ORIGINS = "https://twoja-domena.railway.app"

# Volumes (persistent storage)
[volumes]
uploads = "/app/server/data/uploads"
database = "/app/server/data/sqlite"
