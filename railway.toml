# Railway Configuration
# https://docs.railway.app/guides/configure
# Environment variables and volumes are configured in the Railway dashboard.
# Build and start commands come from the Dockerfile — do NOT set startCommand
# here as the container file layout differs from the source tree.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["server/**", "Dockerfile", "package.json", "pnpm-lock.yaml", "railway.toml", "tsconfig.json"]

[deploy]
# No startCommand — Dockerfile CMD handles it: node server/index.js (via tini)
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
