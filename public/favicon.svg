<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2035"/>
      <stop offset="100%" stop-color="#091525"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34c5b5" stop-opacity="0.3"/>
      <stop offset="35%" stop-color="#75d6c4"/>
      <stop offset="65%" stop-color="#9ef2db"/>
      <stop offset="100%" stop-color="#5b8ff9" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <ellipse cx="16" cy="14" rx="12" ry="9" fill="rgba(117,214,196,0.06)"/>

  <!-- ECG / pulse waveform -->
  <polyline
    points="2,16 6,16 8,11 10,21 12.5,8 15,20 17,14 19,18 21,16 30,16"
    stroke="url(#line)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Bright dot at peak -->
  <circle cx="12.5" cy="8" r="1.4" fill="#9ef2db" opacity="0.9"/>
</svg>
