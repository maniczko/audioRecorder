<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#071119"/>
      <stop offset="100%" stop-color="#0d2033"/>
    </linearGradient>
    <linearGradient id="mic" x1="24" y1="10" x2="40" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9ef2db"/>
      <stop offset="100%" stop-color="#49a8d9"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#75d6c4" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#75d6c4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#75d6c4" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <circle cx="32" cy="30" r="20" fill="rgba(117,214,196,0.06)"/>

  <!-- Microphone body -->
  <rect x="25" y="10" width="14" height="22" rx="7" fill="url(#mic)"/>

  <!-- Microphone stand arc -->
  <path d="M18 30 Q18 44 32 44 Q46 44 46 30" stroke="url(#mic)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Microphone stand stem -->
  <line x1="32" y1="44" x2="32" y2="52" stroke="url(#mic)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Microphone base -->
  <line x1="24" y1="52" x2="40" y2="52" stroke="url(#mic)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Waveform bars at bottom -->
  <rect x="8"  y="46" width="3" height="8"  rx="1.5" fill="url(#wave)" opacity="0.6"/>
  <rect x="13" y="42" width="3" height="12" rx="1.5" fill="url(#wave)" opacity="0.8"/>
  <rect x="18" y="44" width="3" height="10" rx="1.5" fill="url(#wave)" opacity="0.7"/>
  <rect x="43" y="44" width="3" height="10" rx="1.5" fill="url(#wave)" opacity="0.7"/>
  <rect x="48" y="42" width="3" height="12" rx="1.5" fill="url(#wave)" opacity="0.8"/>
  <rect x="53" y="46" width="3" height="8"  rx="1.5" fill="url(#wave)" opacity="0.6"/>
</svg>
